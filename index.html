<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alocação Dinâmico</title>
    <style>
        :root { --primary-red: #d32f2f; --bg-body: #f9f9fb; --border-color: #e0e0e0; --text-main: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-body); padding: 20px; color: var(--text-main); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; }
        .sub-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; gap: 20px; }
        .btn-group { display: flex; gap: 10px; width: auto; }
        .btn { border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; gap: 8px; text-transform: uppercase; justify-content: center; align-items: center; }
        .btn-save { background-color: var(--primary-red); color: white; }
        
        .btn-clear { background-color: #757575; color: white; }
        .btn-clear:hover { background-color: #616161; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; border: 1px solid var(--border-color); border-radius: 4px; padding: 15px; }
        .input-box { margin-bottom: 10px; }
        .input-box label { display: block; font-size: 9px; font-weight: 700; margin-bottom: 4px; }
        .input-box select { width: 100%; padding: 7px; border: 1px solid #eee; font-size: 11px; }
        .filter-box { display: flex; flex-direction: column; min-width: 150px; }
        .filter-box label { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #555; }
        .filter-box select { padding: 8px; font-weight: bold; border-radius: 5px; border: 1px solid #ccc; font-size: 14px;}
        .actions-container { display: flex; align-items: flex-end; gap: 15px; flex-wrap: wrap; justify-content: flex-end; }
        
        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .custom-modal-box { background: #fff; padding: 25px 20px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 320px; max-width: 90%; text-align: center; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .custom-modal-box h3 { margin-top: 0; font-size: 15px; color: #333; margin-bottom: 20px; font-weight: 600; line-height: 1.4; white-space: pre-line; }
        .custom-modal-input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; box-sizing: border-box; outline: none; font-weight: bold; letter-spacing: 2px;}
        .custom-modal-input:focus { border-color: #333; }
        .custom-modal-actions { display: flex; gap: 10px; justify-content: center; }
        .custom-modal-actions button { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1; text-transform: uppercase; font-size: 12px; }
        .btn-cancelar { background: #e0e0e0; color: #444; }
        .btn-cancelar:hover { background: #d0d0d0; }
        .btn-confirmar { background: #d32f2f; color: #fff; }
        .btn-confirmar:hover { background: #b71c1c; }

        /* Estilos do Painel de Configurações */
        .config-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; transition: 0.3s; padding: 5px; }
        .config-btn:hover { transform: rotate(45deg); }
        .config-panel { width: 550px !important; max-width: 95% !important; text-align: left !important; }
        .config-grid { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .config-section { flex: 1; border: 1px solid var(--border-color); padding: 15px; border-radius: 6px; background: #fafafa; min-width: 200px;}
        .config-section h4 { margin-top: 0; margin-bottom: 10px; font-size: 13px; color: var(--primary-red); border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .config-input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; outline: none;}
        .config-btn-action { width: 100%; padding: 8px; background: #333; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: 0.2s;}
        .config-btn-action:hover { background: var(--primary-red); }
        #configMsg { height: 15px; font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 15px; }

        /* === Modal de Salvamento com Prensa de Sapato Clean === */
        .saving-box { padding: 40px 30px !important; }
        .factory-animation { position: relative; height: 90px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; overflow: hidden; }
        .shoe-press-svg { width: 90px; height: 90px; }
        
        .press-piston {
            animation: press-down 1.6s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        }
        .press-sole {
            transform-origin: 32px 52px; /* Base da sola para compressão natural */
            animation: squish-sole 1.6s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        }

        @keyframes press-down {
            0%, 15%, 100% { transform: translateY(0); }
            45%, 65% { transform: translateY(17px); } /* Desce a prensa */
        }
        @keyframes squish-sole {
            0%, 15%, 100% { transform: scaleY(1); }
            45%, 65% { transform: scaleY(0.55); } /* Amassa a sola */
        }
        
        .saving-progress-wrapper { width: 100%; background-color: #eee; border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 10px; }
        .saving-progress-fill { width: 0%; height: 100%; background-color: var(--primary-red); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s; box-shadow: 0 0 10px rgba(211, 47, 47, 0.4); }
        .saving-progress-text { font-size: 14px; font-weight: 800; color: #555; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .sub-header { flex-direction: column; align-items: flex-start; }
            .actions-container { width: 100%; justify-content: flex-start; }
            .filter-box { width: 100%; }
            .btn-group { width: 100%; }
            .btn-save, .btn-clear { flex-grow: 1; }
        }
    </style>
</head>

        </div>
    </div>

        </div>
    </div>

    <div id="savingModalOverlay" class="custom-modal-overlay" style="z-index: 999999;">
        <div class="custom-modal-box saving-box">
            <div class="factory-animation">
                <svg class="shoe-press-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 8 52 L 56 52 L 56 58 L 8 58 Z" fill="#444" />
                    <path d="M 4 58 L 60 58 L 60 62 L 4 62 Z" fill="#222" />

                    <g class="press-sole">
                        <path d="M 16 52 C 24 54 40 54 48 52 C 52 48 48 44 40 44 C 30 44 24 46 16 46 C 12 48 12 50 16 52 Z" fill="var(--primary-red)" />
                        <path d="M 18 49 L 46 49" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
                    </g>

                    <g class="press-piston">
                        <rect x="28" y="-10" width="8" height="32" fill="#666" />
                        <rect x="24" y="18" width="16" height="6" fill="#333" />
                        <path d="M 12 24 L 52 24 L 52 30 L 12 30 Z" fill="#444" />
                        <path d="M 14 30 L 50 30 L 50 32 L 14 32 Z" fill="#222" />
                    </g>
                </svg>
            </div>
            <h3 style="margin-bottom: 12px; font-size: 16px;">Sincronizando Matriz...</h3>
            <div class="saving-progress-wrapper">
                <div id="savingProgressBar" class="saving-progress-fill"></div>
            </div>
            <div id="savingProgressText" class="saving-progress-text">0%</div>
        </div>
    </div>

    <div id="configModalOverlay" class="custom-modal-overlay">

            <div id="configMsg"></div>
            
            <div class="config-grid">

                    <select id="configModeloSelect" class="config-input">
                        </select>
                    <input type="text" id="configNovoTamanho" class="config-input" placeholder="Ex: 38/39, 10X, 42..." autocomplete="off">
                    <button class="config-btn-action" onclick="adicionarTamanho()">Salvar Tamanho</button>
                </div>
                
                <div class="config-section">
                    <h4>👤 Adicionar Funcionário</h4>

                    <button class="config-btn-action" onclick="adicionarCracha()">Salvar Crachá</button>
                </div>
            </div>

            "PRIORITY SL BOR BICOLOR": ["5X", "6", "7X", "8", "8X", "9", "9X", "7", "4", "4X", "10", "6X", "10X", "3X", "5", "12", "11"],
            "PRO 5 TRAINER SL BOR": ["45", "41", "36", "40", "42", "38", "37", "43", "35", "34", "44", "39"],
            "QUEST 6 BOR": ["6", "7", "7X", "8X", "4", "4X", "5X", "5", "9X", "10", "11", "12"],
            "QUEST 7 SL BOR": ["8,5", "7", "11", "10", "9,5", "4,5", "12", "4", "6", "7,5", "5,5"],
            "RACER TR23 SL BOR": ["7", "6,5", "9", "9,5", "11,5", "6", "8", "10,5"],
            "RUN DEFY SL BOR": ["10", "11", "12", "4", "4,5", "5,5", "6", "7", "7,5", "8,5", "9,5"],
            "RUN SWIFT 3 SL": ["10", "11", "12", "4X", "6", "7", "7X", "8X", "9X", "5X", "9", "11X", "4", "8", "12X", "5", "3X", "10X", "6X", "14", "13"],
            "SAMBA OG SL BOR": ["11,5", "4", "4,5", "5,5", "6", "6,5", "7", "8", "9", "9,5", "10,5", "12"],
            "SOLADO TNR SL BOR": ["30", "32", "35", "33", "29", "36", "31", "34", "28"],
            "STREET STYLE 24 BOR": ["43", "42", "36", "38/39", "34/35", "37", "40", "44/45", "41"],
            "STREETTALK BIQ SL BOR": ["5,5/6", "6,5/7", "8/9", "9X/10X", "4/4,5", "11,5/12"],
            "STREETTALK SL BOR": ["11,5", "4,5", "5,5", "6", "6,5", "7", "8", "9", "9,5", "4", "10,5", "12"],
            "UPTAKE 25 HG SL BOR": ["41", "44/45", "43", "46", "38/39", "40", "42", "37", "36", "34/35"],
            "UPTAKE 25 ID SL BOR": ["38/39", "44/45", "42", "46", "43", "36", "41", "37", "40", "34/35"],
            "VAPOR 15 CL IC SL BO": ["12/12X", "7/7X", "6/6X", "11/11X", "8/8X", "9/9X", "5/5X", "10/10X", "4/4X"],
            "VAPOR 15 CL IC SL BO BICO": ["10/10X", "12/12X", "6/6X", "7/7X", "8/8X", "9/9X", "5/5X", "11/11X", "4/4X"],
            "VAPOR 15 CL TF SL BO": ["10/10X", "12/12X", "6/6X", "7/7X", "8/8X", "9/9X", "5/5X", "11/11X", "4/4X"],
            "VAPOR 15 CL TF SL BO BICO": ["10/10X", "12/12X", "6/6X", "7/7X", "8/8X", "9/9X", "5/5X", "11/11X", "4/4X"],
            "VAZIO": ["VAZIO"],
            "VEJA REC SL BOR": ["35"],
        };

        // Carrega dados customizados ou os defaults
        let usuariosAutorizados = JSON.parse(localStorage.getItem('customUsuarios')) || defaultUsuarios;
        let dataMap = JSON.parse(localStorage.getItem('customDataMap')) || defaultDataMap;
        
        let modelNames = Object.keys(dataMap).sort();

        // ======= LÓGICA DE CONFIGURAÇÃO =======
        async function verificarSenhaConfig() {
            const senha = await customPrompt("Acesso Restrito!\nDigite a senha administrativa:");
            if (senha === "14490") {
                abrirPainelConfig();
            } else if (senha !== null && senha !== "") {
                await customAlert("Senha incorreta!");
            }
        }

        function abrirPainelConfig() {
            const selectMod = document.getElementById('configModeloSelect');
            selectMod.innerHTML = '<option value="">Selecione um Modelo...</option>';
            modelNames.forEach(m => {
                if(m !== "VAZIO") selectMod.innerHTML += `<option value="${m}">${m}</option>`;
            });
            document.getElementById('configModalOverlay').style.display = 'flex';
        }

        function fecharConfig() {
            document.getElementById('configModalOverlay').style.display = 'none';
        }

        function mostrarMsgConfig(msg, cor) {
            const el = document.getElementById('configMsg');
            el.style.color = cor;
            el.innerText = msg;
            setTimeout(() => el.innerText = '', 3500);
        }

        function adicionarTamanho() {
            const mod = document.getElementById('configModeloSelect').value;
            const tam = document.getElementById('configNovoTamanho').value.trim();
            
            if(!mod || !tam) { 
                mostrarMsgConfig("⚠️ Preencha o modelo e o tamanho antes de salvar.", "#d32f2f"); 
                return; 
            }
            
            if(!dataMap[mod].includes(tam)) {
                dataMap[mod].push(tam);
                // Ordena os tamanhos numericamente/alfabeticamente
                dataMap[mod].sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true}));
                
                localStorage.setItem('customDataMap', JSON.stringify(dataMap));
                
                mostrarMsgConfig(`✅ Tamanho ${tam} adicionado com sucesso ao modelo ${mod}!`, "#2e7d32");
                document.getElementById('configNovoTamanho').value = '';
                
                // Atualiza a tela por trás se já houver alocação
                renderizarEstacoes();
            } else {
                mostrarMsgConfig("⚠️ Este tamanho já existe neste modelo.", "#d32f2f");
            }
        }

        function adicionarCracha() {
            const cracha = document.getElementById('configNovoCracha').value.trim();
            const nome = document.getElementById('configNovoNome').value.trim();
            
            if(!cracha || !nome) { 
                mostrarMsgConfig("⚠️ Preencha o número do crachá e o nome.", "#d32f2f"); 
                return; 
            }
            
            usuariosAutorizados[cracha] = nome;
            localStorage.setItem('customUsuarios', JSON.stringify(usuariosAutorizados));
            
            mostrarMsgConfig(`✅ Crachá de ${nome} adicionado com sucesso!`, "#2e7d32");
            document.getElementById('configNovoCracha').value = '';
            document.getElementById('configNovoNome').value = '';
        }
        // ======================================

        // SALVA RASCUNHO TEMPORÁRIO LOCALMENTE NO NAVEGADOR
        function salvarRascunhoLocal() {
            const grupo = document.getElementById('filtroGrupo').value;
            const rascunho = {};
            document.querySelectorAll('.card').forEach((c, index) => {
                const i = index + 1;
                const m = c.querySelector('.sel-modelo').value;
                const t = c.querySelector('.sel-tamanho').value;
                rascunho[i] = { modelo: m, tamanho: t };
            });
            localStorage.setItem('rascunho_' + grupo, JSON.stringify(rascunho));
        }

        function customAlert(msg) {
            return new Promise(resolve => {
                const overlay = document.getElementById('customModalOverlay');
                document.getElementById('customModalMessage').innerText = msg;
                document.getElementById('customModalInput').style.display = 'none';
                document.getElementById('customModalBtnCancel').style.display = 'none';
                
                const btnOk = document.getElementById('customModalBtnOk');
                btnOk.style.display = 'block';
                btnOk.innerText = 'Entendi';
                overlay.style.display = 'flex';

                btnOk.onclick = () => { overlay.style.display = 'none'; resolve(true); };
            });
        }

        function customPrompt(msg) {
            return new Promise(resolve => {
                const overlay = document.getElementById('customModalOverlay');
                const input = document.getElementById('customModalInput');
                document.getElementById('customModalMessage').innerText = msg;
                input.style.display = 'block';
                input.value = '';
                
                const btnCancel = document.getElementById('customModalBtnCancel');
                const btnOk = document.getElementById('customModalBtnOk');
                btnCancel.style.display = 'block';
                btnOk.style.display = 'block';
                btnOk.innerText = 'Confirmar';
                overlay.style.display = 'flex';
                input.focus();

                btnOk.onclick = () => { overlay.style.display = 'none'; resolve(input.value); };
                btnCancel.onclick = () => { overlay.style.display = 'none'; resolve(null); };
                
                input.onkeypress = (e) => { if(e.key === 'Enter') btnOk.click(); };
            });
        }

        const grid = document.getElementById('stationGrid');
        
        function trocarGrupo() { 
            const grupo = document.getElementById('filtroGrupo').value; 
            localStorage.setItem('ultimoGrupoSelecionado', grupo); 
            renderizarEstacoes(); 
        }
        
        async function renderizarEstacoes() {
            const grupo = document.getElementById('filtroGrupo').value;
            const numEstacoes = (grupo === "Grupo 4" || grupo === "Grupo 5") ? 48 : 36;
            document.getElementById('msgCarregando').style.display = 'block';
            grid.style.opacity = '0.5';
            
            // Recarrega modelNames dinâmico a cada renderização caso haja alteração de config
            modelNames = Object.keys(dataMap).sort();

            try {
                const response = await fetch(`${URL_API}?grupo=${grupo}&_t=${new Date().getTime()}`, { cache: "no-store" });
                const dadosAtuais = await response.json();
                
                // Busca se há um rascunho local em andamento para este grupo
                const rascunhoLocal = JSON.parse(localStorage.getItem('rascunho_' + grupo)) || {};

                grid.innerHTML = ''; 
                for (let i = 1; i <= numEstacoes; i++) {
                    const salvo = dadosAtuais.find(d => String(d.estacao) === String(i));
                    
                    let modValue = salvo ? salvo.modelo : "";
                    let tamValue = salvo ? salvo.tamanho : "";

                    // Se existe um rascunho local (mesmo que vazio intencionalmente), sobrepõe
                    if (rascunhoLocal[i] !== undefined) {
                        modValue = rascunhoLocal[i].modelo;
                        tamValue = rascunhoLocal[i].tamanho;
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.setAttribute('data-status', salvo ? salvo.status : "parada");
                    card.innerHTML = `
                        <div class="card-header"><b>ESTAÇÃO ${i}</b></div>
                        <div class="input-box"><label>MODELO</label><select class="sel-modelo" onchange="updateSizes(this); salvarRascunhoLocal();"><option value="">Selecionar</option>${modelNames.map(m => `<option value="${m}" ${m === modValue ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
                        <div class="input-box"><label>TAMANHO</label><select class="sel-tamanho" onchange="salvarRascunhoLocal()"><option value="">Escolha o modelo</option></select></div>`;
                    grid.appendChild(card);
                    
                    if (modValue) {
                        popularTamanhos(card.querySelector('.sel-tamanho'), modValue, tamValue);
                    }
                }
            } catch (e) {} finally { document.getElementById('msgCarregando').style.display = 'none'; grid.style.opacity = '1'; }
        }
        
        function updateSizes(selectModelo) { 
            popularTamanhos(selectModelo.closest('.card').querySelector('.sel-tamanho'), selectModelo.value, ""); 
        }
        
        function popularTamanhos(el, modelo, sel) {
            el.innerHTML = '<option value="">Selecionar</option>';
            if (modelo && dataMap[modelo]) dataMap[modelo].forEach(s => { 
                const o = document.createElement('option'); 
                o.value = s; 
                o.textContent = s; 
                if (s === sel) o.selected = true; 
                el.appendChild(o); 
            });
        }
        
        async function salvarAlocacao() {
            const info = await customPrompt("Para salvar a alocação do " + document.getElementById('filtroGrupo').value + ",\ninforme seu crachá:");
            const crachaDigitado = info ? info.trim() : "";
            const nomeUsuario = usuariosAutorizados[crachaDigitado];
            
            if (!nomeUsuario) {
                await customAlert("Acesso negado. Crachá inválido ou não cadastrado.");
                return;
            }

            const grupo = document.getElementById('filtroGrupo').value;
            const agora = new Date().toLocaleString('pt-BR');
            const payload = { action: "updateAllocation", grupo: grupo, cracha: crachaDigitado, data: [] };
            document.querySelectorAll('.card').forEach((c, i) => {
                const m = c.querySelector('.sel-modelo').value;
                const t = c.querySelector('.sel-tamanho').value;
                if(m && t) payload.data.push({ grupo: grupo, estacao: i + 1, modelo: m, tamanho: t, status: c.getAttribute('data-status'), dataHora: agora }); 
            });

            // Configuração do Popup de Progresso
            const pOverlay = document.getElementById('savingModalOverlay');
            const pBar = document.getElementById('savingProgressBar');
            const pText = document.getElementById('savingProgressText');
            
            try {
                const btn = document.getElementById('btnSalvar'); 
                btn.innerText = "⌛ Salvando..."; 
                btn.disabled = true;

                // Mostra o Modal de Animação e reseta para 0
                pOverlay.style.display = 'flex';
                pBar.style.width = '0%';
                pBar.style.backgroundColor = 'var(--primary-red)';
                pText.innerText = '0%';
                
                // Simulador de progresso enquanto aguarda a API
                let progress = 0;
                const progressInterval = setInterval(() => {
                    if (progress < 90) {
                        progress += Math.random() * 8 + 3;
                        if(progress > 90) progress = 90;
                        pBar.style.width = progress + '%';
                        pText.innerText = Math.floor(progress) + '%';
                    }
                }, 250);

                // Executa a chamada real para a base de dados
                await fetch(URL_API, { method: 'POST', body: JSON.stringify(payload) });

                // Quando a requisição finaliza com sucesso, pular direto pra 100%
                clearInterval(progressInterval);
                pBar.style.width = '100%';
                pText.innerText = '100%';
                
                // Pequena pausa para a animação visual atingir o final com suavidade
                await new Promise(r => setTimeout(r, 400)); 
                
                localStorage.setItem('alocacaoGlobalSalva', JSON.stringify({
                    grupo: grupo,
                    cracha: crachaDigitado,
                    nome: nomeUsuario, 
                    dataHora: agora,
                    _t: Date.now()
                }));
                
                // Após salvar na base, o rascunho é limpo
                localStorage.removeItem('rascunho_' + grupo);

                pOverlay.style.display = 'none';
                await customAlert(`Salvo com sucesso, ${nomeUsuario}!`); 
                renderizarEstacoes();
                
            } catch (e) { 
                // Se der erro, a barra fica laranja momentaneamente
                pBar.style.backgroundColor = '#ff9800';
                pText.innerText = 'Erro na conexão!';
                await new Promise(r => setTimeout(r, 1000));
                pOverlay.style.display = 'none';
                await customAlert('Erro ao tentar salvar.'); 
            } finally { 
                // Fallback para esconder e resetar tudo
                pOverlay.style.display = 'none';
                document.getElementById('btnSalvar').innerText = "💾 Salvar Alocação"; 
                document.getElementById('btnSalvar').disabled = false; 
            }
        }

        async function limparAlocacao() {
            const confirmar = await new Promise(resolve => {
                const overlay = document.getElementById('customModalOverlay');
                document.getElementById('customModalMessage').innerText = "Tem certeza que deseja limpar todas as seleções de modelos e tamanhos deste grupo?";
                document.getElementById('customModalInput').style.display = 'none';
                const btnCancel = document.getElementById('customModalBtnCancel');
                const btnOk = document.getElementById('customModalBtnOk');
                btnCancel.style.display = 'block';
                btnOk.style.display = 'block';
                btnOk.innerText = 'Sim, Limpar';
                overlay.style.display = 'flex';
                btnOk.onclick = () => { overlay.style.display = 'none'; resolve(true); };
                btnCancel.onclick = () => { overlay.style.display = 'none'; resolve(false); };
            });

            if (confirmar) {
                const grupo = document.getElementById('filtroGrupo').value;
                // Apaga também os rascunhos que pudessem estar salvos para este grupo
                localStorage.removeItem('rascunho_' + grupo);
                
                document.querySelectorAll('.card').forEach(card => {
                    const selModelo = card.querySelector('.sel-modelo');
                    const selTamanho = card.querySelector('.sel-tamanho');
                    if (selModelo) selModelo.value = "";
                    if (selTamanho) selTamanho.innerHTML = '<option value="">Selecionar</option>';
                });
            }
        }
        
        window.onload = () => { 
            const g = localStorage.getItem('ultimoGrupoSelecionado'); 
            if (g) document.getElementById('filtroGrupo').value = g; 
            renderizarEstacoes(); 
        };
    </script>
